naftiko: "1.0.0-alpha1"

info:
  label: "Umami Analytics API"
  description: "Privacy-first web analytics API for website statistics, sessions, events, and team management."
  tags:
    - Umami
    - Analytics
    - Web Analytics
    - Privacy
    - Open Source
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UMAMI_BEARER_TOKEN: UMAMI_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: umami
      baseUri: https://api.umami.is
      description: "Umami Analytics API for website analytics and management."
      authentication:
        type: bearer
        token: "{{UMAMI_BEARER_TOKEN}}"
      resources:
        - name: websites
          path: /api/websites
          description: "Website management and configuration"
          operations:
            - name: list-websites
              method: GET
              description: "List all websites accessible to the authenticated user"
              inputParameters:
                - name: includeTeams
                  in: query
                  type: boolean
                  required: false
                  description: "Include team-owned websites"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Filter by name or domain"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-website
              method: POST
              description: "Add a new website to Umami for tracking"
              inputBody:
                type: object
                properties:
                  name:
                    type: string
                    description: "Display name for the website"
                  domain:
                    type: string
                    description: "Website domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: website
          path: /api/websites/{websiteId}
          description: "Individual website management"
          operations:
            - name: get-website
              method: GET
              description: "Get a specific website by ID"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-website
              method: DELETE
              description: "Remove a website from Umami"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: website-stats
          path: /api/websites/{websiteId}/stats
          description: "Website analytics statistics"
          operations:
            - name: get-website-stats
              method: GET
              description: "Get summarized statistics for a website"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
                - name: startAt
                  in: query
                  type: integer
                  required: true
                  description: "Start timestamp in milliseconds"
                - name: endAt
                  in: query
                  type: integer
                  required: true
                  description: "End timestamp in milliseconds"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: website-pageviews
          path: /api/websites/{websiteId}/pageviews
          description: "Website pageview time series"
          operations:
            - name: get-website-pageviews
              method: GET
              description: "Get pageview data bucketed by time unit"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
                - name: startAt
                  in: query
                  type: integer
                  required: true
                  description: "Start timestamp in milliseconds"
                - name: endAt
                  in: query
                  type: integer
                  required: true
                  description: "End timestamp in milliseconds"
                - name: unit
                  in: query
                  type: string
                  required: true
                  description: "Time bucket unit (minute, hour, day, month, year)"
                - name: timezone
                  in: query
                  type: string
                  required: true
                  description: "IANA timezone name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: website-metrics
          path: /api/websites/{websiteId}/metrics
          description: "Website metrics by dimension"
          operations:
            - name: get-website-metrics
              method: GET
              description: "Get metrics broken down by a specific dimension"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
                - name: startAt
                  in: query
                  type: integer
                  required: true
                  description: "Start timestamp in milliseconds"
                - name: endAt
                  in: query
                  type: integer
                  required: true
                  description: "End timestamp in milliseconds"
                - name: type
                  in: query
                  type: string
                  required: true
                  description: "Metric dimension (url, referrer, browser, os, device, country, etc.)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: active-visitors
          path: /api/websites/{websiteId}/active
          description: "Real-time active visitor count"
          operations:
            - name: get-active-visitors
              method: GET
              description: "Get number of currently active visitors"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sessions
          path: /api/websites/{websiteId}/sessions
          description: "Visitor session records"
          operations:
            - name: list-sessions
              method: GET
              description: "List session records for a website"
              inputParameters:
                - name: websiteId
                  in: path
                  type: string
                  required: true
                  description: "Website identifier"
                - name: startAt
                  in: query
                  type: integer
                  required: true
                  description: "Start timestamp in milliseconds"
                - name: endAt
                  in: query
                  type: integer
                  required: true
                  description: "End timestamp in milliseconds"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: teams
          path: /api/teams
          description: "Team management"
          operations:
            - name: list-teams
              method: GET
              description: "List all teams accessible to the user"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-team
              method: POST
              description: "Create a new team"
              inputBody:
                type: object
                properties:
                  name:
                    type: string
                    description: "Team name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: umami-api
      resources:
        - path: /v1/websites
          name: websites
          description: "Website management"
          operations:
            - method: GET
              name: list-websites
              description: "List websites"
              call: "umami.list-websites"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: umami-mcp
      transport: http
      tools:
        - name: list-websites
          description: "List all tracked websites"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.list-websites"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-website-stats
          description: "Get analytics statistics for a website"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.get-website-stats"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-website-pageviews
          description: "Get pageview time series for a website"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.get-website-pageviews"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-website-metrics
          description: "Get metrics by dimension for a website"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.get-website-metrics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-active-visitors
          description: "Get current active visitor count for a website"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.get-active-visitors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-sessions
          description: "List visitor sessions for a website"
          hints:
            readOnly: true
            openWorld: true
          call: "umami.list-sessions"
          outputParameters:
            - type: object
              mapping: "$."
